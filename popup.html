<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt 收藏夹</title>
  <link rel="stylesheet" href="./src/styles/tokens.css">
  <link rel="stylesheet" href="./src/popup/popup.css">
</head>
<body>
  <div id="app">
    <!-- 顶部搜索栏 -->
    <div id="search-container">
      <search-bar id="main-search" placeholder="🔍 搜索 Prompt..."></search-bar>
    </div>

    <!-- 内容区 -->
    <div id="content">
      <!-- 搜索 Tab -->
      <div id="tab-search" class="tab-content">
        <div id="search-results"></div>
      </div>

      <!-- 最近使用 Tab -->
      <div id="tab-recent" class="tab-content active">
        <div class="section-header">
          <span class="section-title">📋 最近使用</span>
        </div>
        <div id="recent-list"></div>
      </div>

      <!-- 收藏 Tab -->
      <div id="tab-favorites" class="tab-content">
        <div class="section-header">
          <span class="section-title">⭐ 我的收藏</span>
        </div>
        <div id="favorites-list"></div>
      </div>

      <!-- 分类 Tab -->
      <div id="tab-categories" class="tab-content">
        <div class="section-header">
          <span class="section-title">📁 分类浏览</span>
        </div>
        <div id="category-tree-container"></div>
      </div>
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <div class="empty-title">暂无 Prompt</div>
      <div class="empty-desc">点击下方"打开管理"创建第一条 Prompt</div>
    </div>

    <!-- 底部导航 -->
    <div id="bottom-nav">
      <button class="nav-btn active" data-tab="recent">
        <span class="nav-icon">🕐</span>
        <span class="nav-label">最近</span>
      </button>
      <button class="nav-btn" data-tab="favorites">
        <span class="nav-icon">⭐</span>
        <span class="nav-label">收藏</span>
      </button>
      <button class="nav-btn" data-tab="search">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">搜索</span>
      </button>
      <button class="nav-btn" data-tab="categories">
        <span class="nav-icon">📁</span>
        <span class="nav-label">分类</span>
      </button>
    </div>

    <!-- 底部操作栏 -->
    <div id="footer-bar">
      <button id="open-manager-btn" class="text-btn">⚙️ 打开管理</button>
    </div>
  </div>

  <!-- Toast 容器 -->
  <toast-message></toast-message>

  <!-- 编辑对话框 -->
  <prompt-editor id="popup-editor" class="hidden"></prompt-editor>

  <script type="module" src="./src/popup/popup.js"></script>
</body>
</html>
